name: publish to curseforge
on:
  workflow_call:
    inputs:
      mod_name:
        required: true
        type: string
      version:
        required: true
        type: string
      minecraft_versions:
        required: true
        type: string
      build_run_id:
        required: true
        type: string
      relations:
        required: false
        type: string
        default: '[]'
      environment:
        required: false
        type: string
        default: ''
      java_versions:
        required: false
        type: string
        default: ''
      loaders:
        required: true
        type: string
      release_type:
        required: false
        type: string
        default: 'release'
      changelog:
        required: false
        type: string
        default: ''
      changelog_type:
        required: false
        type: string
        default: 'text'
    secrets:
      CURSEFORGE_LEGACY_API_TOKEN:
        required: true
      CURSEFORGE_API_TOKEN:
        required: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: download artifacts
        uses: actions/download-artifact@v5
        with:
          name: Artifacts
          run-id: ${{ inputs.build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: build/libs

      - name: checkout workflows
        uses: actions/checkout@v6
        with:
          repository: victorfaurschou/minecraft-modding-workflows
          token: ${{ secrets.WORKFLOWS_TOKEN }}
          path: minecraft-modding-workflows

      - name: publish
        env:
          CURSEFORGE_LEGACY_API_TOKEN: ${{ secrets.CURSEFORGE_LEGACY_API_TOKEN }}
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
          PROJECT_ID: ${{ vars.CURSEFORGE_PROJECT_ID }}
          VERSION: ${{ inputs.version }}
          MINECRAFT_VERSIONS: ${{ inputs.minecraft_versions }}
          JAR: build/libs/${{ inputs.mod_name }}-${{ inputs.version }}.jar
          MOD_NAME: ${{ inputs.mod_name }}
          CURSEFORGE_RELATIONS: ${{ inputs.relations }}
          ENVIRONMENT: ${{ inputs.environment }}
          JAVA_VERSIONS: ${{ inputs.java_versions }}
          LOADERS: ${{ inputs.loaders }}
          RELEASE_TYPE: ${{ inputs.release_type }}
          CHANGELOG: ${{ inputs.changelog }}
          CHANGELOG_TYPE: ${{ inputs.changelog_type }}
        run: sh minecraft-modding-workflows/scripts/curseforge.sh
