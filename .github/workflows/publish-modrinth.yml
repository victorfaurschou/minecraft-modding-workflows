name: publish to modrinth
on:
  workflow_call:
    inputs:
      mod_name:
        required: true
        type: string
      version:
        required: true
        type: string
      minecraft_versions:
        required: true
        type: string
      build_run_id:
        required: true
        type: string
      loaders:
        required: true
        type: string
      version_name:
        required: false
        type: string
        default: ''
      version_type:
        required: false
        type: string
        default: 'release'
      dependencies:
        required: false
        type: string
        default: '[]'
      changelog:
        required: false
        type: string
        default: ''
      environment:
        required: true
        type: string
    secrets:
      MODRINTH_TOKEN:
        required: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: download artifacts
        uses: actions/download-artifact@v5
        with:
          name: Artifacts
          run-id: ${{ inputs.build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: build/libs

      - name: checkout workflows
        uses: actions/checkout@v6
        with:
          repository: victorfaurschou/minecraft-modding-workflows
          token: ${{ secrets.WORKFLOWS_TOKEN }}
          path: minecraft-modding-workflows

      - name: publish
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
          VERSION: ${{ inputs.version }}
          MINECRAFT_VERSIONS: ${{ inputs.minecraft_versions }}
          JAR: build/libs/${{ inputs.mod_name }}-${{ inputs.version }}.jar
          MOD_NAME: ${{ inputs.mod_name }}
          VERSION_NAME: ${{ inputs.version_name }}
          LOADERS: ${{ inputs.loaders }}
          CHANGELOG: ${{ inputs.changelog }}
          VERSION_TYPE: ${{ inputs.version_type }}
          DEPENDENCIES: ${{ inputs.dependencies }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: sh minecraft-modding-workflows/scripts/modrinth.sh
